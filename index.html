<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORY Studio - Editor Cinematográfico</title>
    
    <!-- Importar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importar Bibliotecas React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Importar Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white m-0 p-0 overflow-hidden w-screen h-screen font-sans">

    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ÍCONES ---
        const IconBase = ({ children, size = 24, className = "", fill = "none", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
        const Pause = (props) => <IconBase {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></IconBase>;
        const Video = (props) => <IconBase {...props}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconBase>;
        const Eye = (props) => <IconBase {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const EyeOff = (props) => <IconBase {...props}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></IconBase>;
        const Upload = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>;
        const ImageIcon = (props) => <IconBase {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>;

        const ORY_COLORS = { blue: '#0043FF', dark: '#303030', light: '#F4F4F4', green: '#00FF00' };
        
        const TOTAL_DURATION = 60.0; // Atualizado para 1 minuto

        // DADOS COMBINADOS (Estendido para 60 segundos)
        const subtitleData = [
          { id: 1, start: 0.401, end: 1.638, text: "Bem que se diz que santo" },
          { id: 2, start: 1.638, end: 3.644, text: "de casa não faz milagre." },
          { id: 3, start: 3.644, end: 5.600, text: "A Luíza, filha da Laura," },
          { id: 4, start: 5.600, end: 6.954, text: "já passava em tratamento" },
          { id: 5, start: 6.954, end: 7.338, text: "com a gente" },
          { id: 6, start: 7.338, end: 9.244, text: "e não usou a contenção." },
          { id: 7, start: 9.244, end: 10.164, text: "O que aconteceu?" },
          { id: 8, start: 10.164, end: 11.334, text: "Os dentes se movimentaram." },
          { id: 9, start: 11.334, end: 12.069, text: "Está passando por" },
          { id: 10, start: 12.069, end: 13.072, text: "um novo tratamento" },
          { id: 11, start: 13.072, end: 14.560, text: "de refinamento." },
          { id: 12, start: 14.560, end: 15.563, text: "Luíza está animada" },
          { id: 13, start: 15.563, end: 16.316, text: "pra começar" },
          { id: 14, start: 16.316, end: 18.205, text: "tudo de novo?" },
          { id: 15, start: 18.205, end: 18.639, text: "É doutora," },
          { id: 16, start: 18.639, end: 19.275, text: "acabei viajando" },
          { id: 17, start: 19.275, end: 20.177, text: "e eu esqueci" },
          { id: 18, start: 20.177, end: 21.431, text: "de pegar a contenção," },
          { id: 19, start: 21.431, end: 21.832, text: "mas agora eu" },
          { id: 20, start: 21.832, end: 23.003, text: "estou muito animada." },
          { id: 21, start: 23.003, end: 24.474, text: "Você me perdoa!?" },
          { id: 22, start: 24.474, end: 25.510, text: "Eu perdoo, Luiza." },
          { id: 23, start: 25.510, end: 25.995, text: "Vamos lá" },
          { id: 24, start: 25.995, end: 26.831, text: "começar de novo." },
          { id: 25, start: 26.831, end: 28.319, text: "Agora firme no tratamento!" },
          
          // MODO PUBLICIDADE / AD MODE (29.5s a 60.0s)
          { id: 26, start: 29.500, end: 33.000, text: "O QUE TE FAZ SORRIR?" },
          { id: 27, start: 33.000, end: 36.500, text: "Descubra a ORY" },
          { id: 28, start: 36.500, end: 40.000, text: "Odontologia e Harmonização Facial." },
          { id: 29, start: 40.000, end: 44.000, text: "Nossa equipe especializada está pronta para cuidar de você." },
          { id: 30, start: 44.000, end: 48.000, text: "Ortodontia e Alinhadores invisíveis." },
          { id: 31, start: 48.000, end: 51.500, text: "Tecnologia de ponta e brasilidade." },
          { id: 32, start: 51.500, end: 54.500, text: "Ory é ORYGINAL" },
          { id: 33, start: 54.500, end: 57.000, text: "Ory é ORYGEM" },
          { id: 34, start: 57.000, end: 60.000, text: "Agende sua avaliação!" }
        ];

        function App() {
          const [isPlaying, setIsPlaying] = useState(false);
          const [isRecordingMode, setIsRecordingMode] = useState(false);
          const [activeSubtitle, setActiveSubtitle] = useState(null);
          const [showGuides, setShowGuides] = useState(false);
          const [bgMode, setBgMode] = useState('video');
          const [localVideoUrl, setLocalVideoUrl] = useState('');
          const [isDownloadModalOpen, setIsDownloadModalOpen] = useState(false);
          const [countdown, setCountdown] = useState(null);
          
          // --- ESTADO: Ad Mode ---
          const [isAdMode, setIsAdMode] = useState(false);
          const isAdModeRef = useRef(false);
          
          const videoRef = useRef(null);
          const fileInputRef = useRef(null);
          const timeRef = useRef(0);
          const activeSubRef = useRef(null);
          
          const previewProgressBarRef = useRef(null);
          const hudTimeRef = useRef(null);

          const getZoomLevel = (time) => {
            if (time >= 7.3 && time <= 11.3) return 1.25;
            if (time >= 18.2 && time <= 23.0) return 1.30;
            return 1.15; 
          };

          const safePlayVideo = () => {
              if (videoRef.current && videoRef.current.networkState !== 3) {
                  const playPromise = videoRef.current.play();
                  if (playPromise !== undefined) {
                      playPromise.catch(error => console.warn("A reprodução do vídeo foi bloqueada:", error));
                  }
              }
          };

          const togglePlay = () => {
            if (!isPlaying) {
              if (bgMode === 'video') safePlayVideo();
              setIsPlaying(true);
            } else {
              if (bgMode === 'video' && videoRef.current) videoRef.current.pause();
              setIsPlaying(false);
            }
          };

          const resetTime = () => {
            timeRef.current = 0;
            isAdModeRef.current = false;
            setIsAdMode(false);
            if (videoRef.current && videoRef.current.readyState > 0) {
                videoRef.current.currentTime = 0;
            }
            if (previewProgressBarRef.current) previewProgressBarRef.current.style.width = '0%';
            if (hudTimeRef.current) hudTimeRef.current.innerText = '0.00s';
            setActiveSubtitle(null);
            activeSubRef.current = null;
          };

          const handleVideoUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const url = URL.createObjectURL(file);
              setLocalVideoUrl(url);
              setBgMode('video');
              resetTime();
            }
          };

          useEffect(() => {
            let lastTime = performance.now();
            let frameId;

            const loop = (now) => {
              if (isPlaying && countdown === null) {
                let time = timeRef.current;
                // Cap delta time to 0.1s to prevent massive jumps and GPU freezes
                const delta = Math.min((now - lastTime) / 1000, 0.1);
                
                // Temporizador Híbrido OTIMIZADO
                if (bgMode === 'video' && videoRef.current && !videoRef.current.ended && videoRef.current.readyState >= 2 && !videoRef.current.paused) {
                    time = videoRef.current.currentTime;
                } else {
                    time += delta;
                }
                
                timeRef.current = time;

                const currentAdMode = time >= 29.5;
                if (currentAdMode !== isAdModeRef.current) {
                    isAdModeRef.current = currentAdMode;
                    setIsAdMode(currentAdMode);
                }

                if (previewProgressBarRef.current) {
                    previewProgressBarRef.current.style.width = `${(time / TOTAL_DURATION) * 100}%`;
                }
                if (hudTimeRef.current) {
                    hudTimeRef.current.innerText = `${time.toFixed(2)}s`;
                }
                if (videoRef.current && bgMode === 'video') {
                    videoRef.current.style.transform = `scale(${getZoomLevel(time)}) translateY(-6%)`;
                }

                const sub = subtitleData.find(s => time >= s.start && time <= s.end) || null;
                if (sub?.id !== activeSubRef.current?.id) {
                    activeSubRef.current = sub;
                    setActiveSubtitle(sub);
                }

                if (time >= TOTAL_DURATION) {
                    setIsPlaying(false);
                    timeRef.current = 0;
                    isAdModeRef.current = false;
                    setIsAdMode(false);
                    if(videoRef.current) {
                       videoRef.current.pause();
                       videoRef.current.currentTime = 0;
                    }
                }
              }
              lastTime = now;
              frameId = requestAnimationFrame(loop);
            };

            frameId = requestAnimationFrame(loop);
            return () => cancelAnimationFrame(frameId);
          }, [isPlaying, countdown, bgMode]);

          // START RECORDING MODE OTIMIZADO
          const startRecordingMode = () => {
            setIsDownloadModalOpen(false);
            setIsRecordingMode(true);
            setShowGuides(false);
            resetTime();
            setCountdown(5);
            
            // Pré-Aquece o vídeo com a autorização do utilizador para evitar bloqueios ao fim de 5s
            if (videoRef.current && bgMode === 'video') {
                 videoRef.current.play().then(() => {
                     videoRef.current.pause();
                     videoRef.current.currentTime = 0;
                 }).catch(() => {});
            }
          };

          useEffect(() => {
            if (countdown === null) return;
            if (countdown > 0) {
              const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
              return () => clearTimeout(timer);
            } else if (countdown === 0) {
              setCountdown(null);
              setIsPlaying(true);
              safePlayVideo();
            }
          }, [countdown]);

          const stopRecordingMode = () => {
            setIsRecordingMode(false);
            setIsPlaying(false);
            setCountdown(null);
            if (videoRef.current) videoRef.current.pause();
          };

          return (
            <div className="flex w-full h-screen bg-[#0a0a0a] text-white font-sans overflow-hidden">
              <style>{`
                @keyframes popIn { 0% { transform: scale(0.85) translateY(15px); opacity: 0; filter: blur(4px); } 60% { transform: scale(1.05) translateY(-2px); opacity: 1; filter: blur(0px); } 100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px); } }
                .word-reveal { display: inline-block; animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
                .text-glow-white { text-shadow: 0 3px 8px rgba(0,0,0,0.95), 0 0 15px rgba(255,255,255,0.25); }
                .text-glow-blue { color: #0043FF; text-shadow: 0 3px 6px rgba(0,0,0,0.95), 0 0 20px rgba(0,67,255,0.8); }
                .text-shadow-logo { text-shadow: 0 2px 8px rgba(0,0,0,0.25); }
                
                @keyframes bounce-slow { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(5%); } }
                .animate-bounce-slow { animation: bounce-slow 2.5s infinite ease-in-out; }
                @keyframes containerFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
                .subtitle-container { animation: containerFloat 4s ease-in-out infinite; }
                
                @keyframes orbit { 0% { transform: rotate(0deg) translateX(120px) rotate(0deg) scale(1); } 50% { transform: rotate(180deg) translateX(120px) rotate(-180deg) scale(1.5); } 100% { transform: rotate(360deg) translateX(120px) rotate(-360deg) scale(1); } }
                @keyframes orbit-reverse { 0% { transform: rotate(360deg) translateX(80px) rotate(-360deg) scale(0.8); } 50% { transform: rotate(180deg) translateX(80px) rotate(-180deg) scale(1.2); } 100% { transform: rotate(0deg) translateX(80px) rotate(0deg) scale(0.8); } }
                .orbiting-dot-1 { position: absolute; top: 50%; left: 50%; margin-top: -3px; margin-left: -3px; width: 6px; height: 6px; background-color: #0043FF; border-radius: 50%; box-shadow: 0 0 12px 4px rgba(0,67,255,0.5); animation: orbit 5s linear infinite; will-change: transform; }
                .orbiting-dot-2 { position: absolute; top: 50%; left: 50%; margin-top: -2px; margin-left: -2px; width: 4px; height: 4px; background-color: #F4F4F4; border-radius: 50%; box-shadow: 0 0 8px 2px rgba(255,255,255,0.4); animation: orbit-reverse 4s linear infinite; will-change: transform; }
                
                .color-graded-video { filter: contrast(1.05) saturate(1.10); will-change: transform; }
                .vignette-effect { background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 100%); pointer-events: none; }
                
                /* Animações dos Flares (Otimizados com will-change) */
                @keyframes spinSlow { 100% { transform: rotate(360deg); } }
                @keyframes spinSlowReverse { 100% { transform: rotate(-360deg); } }
                .animate-spin-slow { animation: spinSlow 20s linear infinite; will-change: transform; }
                .animate-spin-slow-reverse { animation: spinSlowReverse 25s linear infinite; will-change: transform; }
                
                /* NOVAS ANIMAÇÕES EXTRAVAGANTES DO AD MODE */
                @keyframes adWordPop { 
                  0% { transform: scale(0.3) translateY(60px) rotate(-15deg); opacity: 0; filter: blur(12px); } 
                  50% { transform: scale(1.4) translateY(-10px) rotate(5deg); opacity: 1; filter: blur(0px); } 
                  70% { transform: scale(0.95) translateY(5px) rotate(-2deg); } 
                  100% { transform: scale(1) translateY(0) rotate(0); opacity: 1; filter: blur(0px); } 
                }
                .word-reveal-ad { display: inline-block; animation: adWordPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; will-change: transform, opacity; }
                
                @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
                @keyframes marqueeReverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }
                .animate-marquee { display: flex; width: 200%; animation: marquee 15s linear infinite; will-change: transform; }
                .animate-marquee-reverse { display: flex; width: 200%; animation: marqueeReverse 20s linear infinite; will-change: transform; }
                
                @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; } 20% { opacity: 0.8; } 80% { opacity: 0.8; } 100% { transform: translateY(-20vh) scale(1.5) rotate(360deg); opacity: 0; } }
                .floating-shape { position: absolute; animation: floatUp linear infinite; will-change: transform; }
                
                @keyframes pulseIntense { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.7; } }
                .animate-pulse-intense { animation: pulseIntense 2s ease-in-out infinite; will-change: transform, opacity; }
              `}</style>

              {isDownloadModalOpen && (
                <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/90 p-4">
                  <div className="bg-[#111] border border-white/10 rounded-3xl p-8 max-w-lg w-full shadow-2xl relative">
                    <h2 className="text-2xl font-black mb-2 flex items-center gap-3 tracking-tight text-white">
                      <Video className="text-[#0043FF]" size={28} /> Preparar para Gravação
                    </h2>
                    
                    <div className="space-y-4 mt-6">
                      <div className="p-5 border border-white/10 bg-white/5 rounded-2xl hover:bg-white/10 transition-colors">
                         <h3 className="font-bold text-white mb-2 text-md">Grave com o OBS ou Gravador de Ecrã</h3>
                         <p className="text-sm text-neutral-400 mb-6 leading-relaxed">
                           A aplicação irá esconder todos os botões e menus e iniciar uma contagem de 5 segundos. Utilize o seu gravador de ecrã favorito para capturar o resultado final com a qualidade original exata da pré-visualização!
                         </p>
                         
                         <button onClick={startRecordingMode} className="w-full py-3 bg-[#0043FF] hover:bg-blue-600 text-white rounded-xl font-bold transition-colors text-sm flex items-center justify-center gap-2">
                            <Video size={16} /> LIMPAR TELA E INICIAR CONTAGEM (5s)
                         </button>
                      </div>
                    </div>

                    <button onClick={() => setIsDownloadModalOpen(false)} className="w-full mt-4 py-3 bg-transparent text-neutral-500 hover:text-white font-bold transition-colors text-sm">
                      FECHAR
                    </button>
                  </div>
                </div>
              )}

              {!isRecordingMode && (
                <div className="w-80 h-full border-r border-white/10 bg-[#111] p-6 flex flex-col gap-6 z-20 shrink-0 overflow-y-auto shadow-2xl">
                  <div className="space-y-1 pb-4 border-b border-white/5">
                    <div className="flex items-center gap-2">
                      <div className="w-8 h-8 bg-[#0043FF] rounded-full flex items-center justify-center font-bold text-sm shadow-[0_0_15px_rgba(0,67,255,0.4)]">O</div>
                      <h1 className="text-lg font-bold tracking-tight">ORY STUDIO</h1>
                    </div>
                    <p className="text-[10px] text-neutral-500 font-medium uppercase tracking-[0.2em]">Cinematic Edit - {TOTAL_DURATION}s</p>
                  </div>

                  <div className="space-y-3">
                    <button 
                      onClick={togglePlay}
                      className={`w-full py-4 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 ${isPlaying ? 'bg-white text-black shadow-lg' : 'bg-[#0043FF] text-white hover:bg-blue-600 shadow-lg shadow-blue-500/20'}`}
                    >
                      {isPlaying ? <Pause size={18} fill="currentColor" /> : <Play size={18} fill="currentColor" />}
                      {isPlaying ? 'PAUSAR PREVIEW' : 'REPRODUZIR PREVIEW'}
                    </button>
                    <button 
                      onClick={resetTime}
                      className="w-full py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-semibold flex items-center justify-center gap-2 transition-colors"
                    >
                      <RefreshCw size={14} /> RESETAR TEMPO
                    </button>
                  </div>

                  <div className="pt-2 space-y-3">
                    <p className="text-[10px] text-neutral-500 font-bold uppercase tracking-widest">Opções de Visualização</p>
                    
                    <div className="grid grid-cols-2 gap-2 bg-black/50 p-1 rounded-xl border border-white/5">
                      <button 
                        onClick={() => setBgMode('video')}
                        className={`py-2 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-2 ${bgMode === 'video' ? 'bg-white text-black' : 'text-neutral-500 hover:text-white'}`}
                      >
                        <Video size={14} /> VÍDEO
                      </button>
                      <button 
                        onClick={() => setBgMode('chroma')}
                        className={`py-2 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-2 ${bgMode === 'chroma' ? 'bg-[#00FF00] text-black' : 'text-neutral-500 hover:text-white'}`}
                      >
                        <ImageIcon size={14} /> CHROMA
                      </button>
                    </div>

                    <div className="mt-4 pt-4 border-t border-white/5 space-y-2">
                      <input type="file" accept="video/*" className="hidden" ref={fileInputRef} onChange={handleVideoUpload} />
                      <button 
                        onClick={() => fileInputRef.current.click()}
                        className={`w-full py-3 px-4 rounded-xl border text-xs font-bold flex items-center justify-between transition-all ${localVideoUrl ? 'border-green-500/30 bg-green-500/10 text-green-400' : 'border-white/10 text-neutral-400 hover:bg-white/5'}`}
                      >
                        {localVideoUrl ? 'VÍDEO CARREGADO ✓' : 'CARREGAR FICHEIRO LOCAL'}
                        <Upload size={16} />
                      </button>
                    </div>

                    <button 
                      onClick={() => setShowGuides(!showGuides)}
                      className={`w-full mt-2 py-3 px-4 rounded-xl border text-xs font-bold flex items-center justify-between transition-all ${showGuides ? 'border-[#0043FF] bg-[#0043FF]/10 text-[#0043FF]' : 'border-white/10 text-neutral-400 hover:bg-white/5'}`}
                    >
                      MOSTRAR GUIAS DE ROSTO
                      {showGuides ? <Eye size={16} /> : <EyeOff size={16} />}
                    </button>
                  </div>

                  <div className="mt-auto space-y-4 pt-4">
                    <button 
                      onClick={() => setIsDownloadModalOpen(true)}
                      className={`w-full py-4 rounded-2xl font-black text-sm shadow-xl transition-all flex flex-col items-center justify-center gap-1 bg-[#0043FF] text-white hover:scale-[1.02] shadow-blue-500/20`}
                    >
                      <div className="flex items-center gap-2">
                        <Video size={18} />
                        PREPARAR PARA GRAVAR (OBS)
                      </div>
                    </button>
                  </div>
                </div>
              )}

              <div className="flex-1 h-full flex items-center justify-center relative p-0 sm:p-8 bg-[#050505]">
                
                {/* REMOVIDO: backdrop-blur-md (Era a principal causa do travamento) */}
                {countdown !== null && countdown > 0 && (
                  <div className="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-[#050505]">
                    <h2 className="text-4xl font-black text-white mb-6 text-center leading-tight">
                      Inicie a sua gravação no OBS<br/>
                      <span className="text-[#0043FF]">A reprodução arranca em:</span>
                    </h2>
                    {/* Transformado scale em vez de pulse para melhor performance gráfica */}
                    <div className="text-9xl font-black text-white drop-shadow-[0_0_30px_rgba(0,67,255,0.8)] transition-transform duration-500 scale-110">
                      {countdown}
                    </div>
                  </div>
                )}
                
                {isRecordingMode && countdown === null && (
                  <button onClick={stopRecordingMode} className="absolute top-6 left-6 z-50 px-4 py-2 bg-red-600/30 hover:bg-red-600 text-white text-xs font-bold rounded-full shadow-lg flex items-center gap-2 transition-all opacity-20 hover:opacity-100">
                    <Pause size={14} fill="currentColor" /> SAIR DA TELA LIMPA
                  </button>
                )}

                {!isRecordingMode && (
                  <div className="absolute top-6 right-6 flex items-center gap-4 z-50 bg-black/80 px-4 py-2 rounded-2xl border border-white/10 hidden sm:flex">
                     <div className="flex flex-col items-end">
                       <span className="text-[9px] font-bold text-neutral-400 uppercase tracking-[0.2em]">Timecode</span>
                       <span ref={hudTimeRef} className="text-xl font-mono text-white tracking-widest leading-none mt-1">0.00s</span>
                     </div>
                  </div>
                )}

                {/* --- CANVAS PRINCIPAL --- */}
                <div 
                  className="relative overflow-hidden transition-all duration-500 flex items-center justify-center"
                  style={{ 
                    aspectRatio: '9/16', 
                    height: '100%',
                    maxHeight: isRecordingMode ? '100vh' : '85vh',
                    backgroundColor: bgMode === 'chroma' ? ORY_COLORS.green : '#000',
                    borderRadius: isRecordingMode ? '0px' : '20px',
                    border: isRecordingMode ? 'none' : '1px solid rgba(255,255,255,0.15)',
                    boxShadow: isRecordingMode ? 'none' : '0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 80px rgba(0,67,255,0.1)'
                  }}
                >
                  
                  {/* Camada 1: O Vídeo */}
                  {bgMode === 'video' && (
                    <div className="absolute inset-0 w-full h-full bg-black z-0">
                      <video
                        ref={videoRef}
                        src={localVideoUrl}
                        crossOrigin="anonymous"
                        className="absolute inset-0 w-full h-full object-cover color-graded-video origin-center"
                        style={{ transform: `scale(1.15) translateY(-6%)`, transition: 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)' }}
                        playsInline
                        preload="auto"
                      />
                      <div className="absolute inset-0 vignette-effect"></div>
                    </div>
                  )}

                  {/* Camada 2: O AD MODE (Fundo Branco Publicitário) */}
                  <div className={`absolute inset-0 bg-[#F8F9FA] transition-opacity duration-1000 ease-in-out z-[5] overflow-hidden ${isAdMode ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                      {/* Flares Geométricos Giratórios e Pulsantes (Mais agressivos) */}
                      <div className="absolute top-[-30%] left-[-30%] w-[160%] h-[160%] rounded-full bg-[radial-gradient(circle_at_center,rgba(0,67,255,0.08)_0%,transparent_50%)] animate-spin-slow"></div>
                      <div className="absolute bottom-[-20%] right-[-20%] w-[150%] h-[150%] rounded-full bg-[radial-gradient(circle_at_center,rgba(0,200,255,0.08)_0%,transparent_50%)] animate-spin-slow-reverse"></div>
                      <div className="absolute top-[20%] left-[10%] w-[100%] h-[100%] bg-[radial-gradient(circle_at_center,rgba(0,67,255,0.1)_0%,transparent_60%)] animate-pulse-intense"></div>
                      
                      {/* Formas Flutuantes (Cruzes e Círculos Médicos) */}
                      {isAdMode && (
                          <div className="absolute inset-0 pointer-events-none">
                             <div className="floating-shape text-[#0043FF]/20 font-black text-6xl left-[10%]" style={{ animationDuration: '6s', animationDelay: '0s' }}>+</div>
                             <div className="floating-shape text-[#00c8ff]/20 font-black text-4xl left-[80%]" style={{ animationDuration: '8s', animationDelay: '2s' }}>+</div>
                             <div className="floating-shape border-4 border-[#0043FF]/10 rounded-full w-16 h-16 left-[20%]" style={{ animationDuration: '7s', animationDelay: '4s' }}></div>
                             <div className="floating-shape text-[#0043FF]/15 font-black text-8xl left-[60%]" style={{ animationDuration: '5s', animationDelay: '1s' }}>+</div>
                          </div>
                      )}

                      {/* Marquee Background (Texto gigante a passar no fundo) */}
                      <div className="absolute inset-0 flex flex-col justify-center items-center opacity-[0.04] pointer-events-none -rotate-12 scale-[1.5] gap-8">
                           <div className="animate-marquee">
                               <span className="text-[120px] font-black tracking-tighter text-black px-4">ORY CLINICA ORY CLINICA ORY CLINICA ORY CLINICA</span>
                           </div>
                           <div className="animate-marquee-reverse">
                               <span className="text-[120px] font-black tracking-tighter text-black px-4">ODONTOLOGIA ESTÉTICA ODONTOLOGIA ESTÉTICA ODONTOLOGIA ESTÉTICA</span>
                           </div>
                           <div className="animate-marquee">
                               <span className="text-[120px] font-black tracking-tighter text-[#0043FF] px-4">TECNOLOGIA DE PONTA TECNOLOGIA DE PONTA TECNOLOGIA DE PONTA</span>
                           </div>
                           <div className="animate-marquee-reverse">
                               <span className="text-[120px] font-black tracking-tighter text-black px-4">HARMONIZAÇÃO FACIAL HARMONIZAÇÃO FACIAL HARMONIZAÇÃO FACIAL</span>
                           </div>
                      </div>
                  </div>

                  {/* Camada 3: O Logo do Canto Superior */}
                  <div className="absolute top-12 left-1/2 -translate-x-1/2 flex flex-col items-end pointer-events-none z-10 transition-transform duration-700">
                     <div className="relative">
                        <div className="absolute -top-1 -right-2 w-10 h-10 rounded-full bg-[#0043FF] animate-bounce-slow shadow-[0_0_20px_rgba(0,67,255,0.3)]" style={{ zIndex: 0 }}></div>
                        <span className={`relative z-10 text-[48px] leading-none font-black tracking-tighter transition-colors duration-700 ${isAdMode ? 'text-[#303030]' : 'text-[#303030] text-shadow-logo'}`}>ORY</span>
                     </div>
                     <span className={`text-[16px] leading-none font-medium lowercase pr-1 mt-1 tracking-wide transition-colors duration-700 ${isAdMode ? 'text-[#0043FF]' : 'text-[#0043FF] text-shadow-logo'}`}>clínica</span>
                  </div>

                  {/* Camada de Guias */}
                  {showGuides && !isRecordingMode && !isAdMode && (
                    <div className="absolute inset-0 pointer-events-none z-10 border border-white/20">
                      <div className="absolute inset-0 flex items-center justify-center">
                         <div className="w-64 h-64 border-2 border-dashed border-white/30 rounded-full bg-white/5 flex items-center justify-center">
                            <span className="text-[10px] text-white/60 font-bold uppercase tracking-widest text-center shadow-lg">Rosto do<br/>Paciente</span>
                         </div>
                      </div>
                      <div className="absolute bottom-24 w-full h-[1px] bg-red-500/30"></div>
                    </div>
                  )}

                  {/* Camada 4: As Legendas / Textos (Dinâmicos) */}
                  <div className={`absolute left-0 right-0 px-6 z-20 pointer-events-none flex flex-col items-center transition-all duration-700 ease-in-out ${isAdMode ? 'inset-y-0 justify-center' : 'bottom-20'}`}>
                    {activeSubtitle && (
                      <div className={`relative py-3 px-5 transition-all duration-700 ${isAdMode ? 'w-full max-w-lg scale-110 drop-shadow-2xl' : 'bg-[#0f0f0f]/45 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] subtitle-container'}`}>
                        
                        {/* Pontos a orbitar apenas na vista de vídeo */}
                        {!isAdMode && (
                            <div className="absolute inset-0 pointer-events-none overflow-visible z-0 opacity-40">
                               <div className="orbiting-dot-1"></div>
                               <div className="orbiting-dot-2"></div>
                            </div>
                        )}

                        {/* O Texto em Si */}
                        <div className={`relative flex flex-wrap justify-center z-10 ${isAdMode ? 'gap-x-3 gap-y-3 leading-[1.05]' : 'gap-x-2 gap-y-0 max-w-[95%] leading-[1.1]'}`}>
                          {activeSubtitle.text.split(' ').map((word, idx) => {
                            const cleanWord = word.replace(/[\.,!\?]/g, '');
                            const keywordList = ['Luíza', 'Luiza', 'Laura', 'animada', 'contenção', 'ORY', 'SORRIR', 'ORYGINAL', 'ORYGEM', 'Odontologia', 'Harmonização', 'Alinhadores', 'avaliação'];
                            const isKeyword = cleanWord.length > 8 || keywordList.includes(cleanWord);
                            
                            // Cores adaptativas para Vídeo vs AD Mode
                            let textColorClass = '';
                            if (isAdMode) {
                                textColorClass = isKeyword ? 'text-[#0043FF] drop-shadow-[0_8px_20px_rgba(0,67,255,0.4)] scale-110 origin-center' : 'text-[#202020] drop-shadow-lg';
                            } else {
                                textColorClass = isKeyword ? 'text-glow-blue' : 'text-[#F4F4F4] text-glow-white';
                            }
                            
                            const animationClass = isAdMode ? 'word-reveal-ad' : 'word-reveal';
                            
                            return (
                              <span key={`${activeSubtitle.id}-${idx}`} className={animationClass} style={{ animationDelay: `${idx * 0.05}s` }}>
                                <span className={`font-black uppercase tracking-tight transition-all duration-300 ${isAdMode ? 'text-[40px] sm:text-[48px] md:text-[54px] block transform hover:scale-110' : 'text-[26px] md:text-[30px]'} ${textColorClass}`}>
                                  {word}
                                </span>
                              </span>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Barra de Progresso */}
                  <div className="absolute bottom-0 left-0 w-full h-1 bg-black/40 z-30">
                    <div ref={previewProgressBarRef} className="h-full bg-[#0043FF] shadow-[0_0_10px_rgba(0,67,255,0.8)]" style={{ width: '0%' }}></div>
                  </div>

                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
